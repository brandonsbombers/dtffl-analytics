const list = document.getElementById('playerList');
const search = document.getElementById('search');
const posFilter = document.getElementById('posFilter');

function avatarHTML(p) {
  if (p.headshot) {
    return `<div class="pc-avatar"><img src="${p.headshot}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=pc-avatar-placeholder>👤</div>'"></div>`;
  }
  return '<div class="pc-avatar"><div class="pc-avatar-placeholder">👤</div></div>';
}

function render(players) {
  if (!players.length) {
    list.innerHTML = '<div class="empty-msg">No players found</div>';
    return;
  }
  list.innerHTML = players.map(p => `
    <a href="profiles/${p.slug}.html" class="player-card">
      ${avatarHTML(p)}
      <div class="pc-info">
        <div class="pc-name">${p.name}</div>
        <div class="pc-meta">
          <span class="pos-tag pos-${p.pos}">${p.pos}</span>
          ${p.team}
        </div>
      </div>
      <span class="pc-arrow">›</span>
    </a>`).join('');
}

function filter() {
  const q = search.value.toLowerCase();
  const pos = posFilter.value;
  render(PLAYERS.filter(p =>
    (!q || p.name.toLowerCase().includes(q)) &&
    (!pos || p.pos === pos)
  ));
}

search.addEventListener('input', filter);
posFilter.addEventListener('change', filter);
render(PLAYERS);
</script>
